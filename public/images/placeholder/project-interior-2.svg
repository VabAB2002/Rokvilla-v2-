<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Warm ambient wash -->
  <rect x="300" y="100" width="600" height="600" fill="#C4622D" opacity="0.04"/>

  <!-- Ceiling (dark) -->
  <rect x="0" y="0" width="1200" height="120" fill="#1C1916"/>

  <!-- Floor -->
  <rect x="0" y="720" width="1200" height="80" fill="#1C1916"/>

  <!-- Main left wall panel -->
  <rect x="0" y="120" width="200" height="600" fill="#9E9182" opacity="0.3"/>

  <!-- Main right wall panel -->
  <rect x="1000" y="120" width="200" height="600" fill="#9E9182" opacity="0.3"/>

  <!-- Center back wall zone -->
  <rect x="200" y="120" width="800" height="600" fill="#D4C9B0" opacity="0.2"/>

  <!-- Ceiling-to-floor panels system (staggered vertical slabs) -->
  <!-- Panel group left -->
  <rect x="220" y="120" width="80" height="600" fill="#1C1916" opacity="0.85"/>
  <rect x="320" y="120" width="14" height="600" fill="#C4622D" opacity="0.9"/>
  <rect x="354" y="120" width="80" height="600" fill="#1C1916" opacity="0.6"/>
  <rect x="454" y="120" width="8" height="600" fill="#9E9182" opacity="0.5"/>

  <!-- Panel group right (mirror offset) -->
  <rect x="900" y="120" width="80" height="600" fill="#1C1916" opacity="0.85"/>
  <rect x="886" y="120" width="14" height="600" fill="#C4622D" opacity="0.9"/>
  <rect x="766" y="120" width="80" height="600" fill="#1C1916" opacity="0.6"/>
  <rect x="758" y="120" width="8" height="600" fill="#9E9182" opacity="0.5"/>

  <!-- Center open space / light shaft -->
  <rect x="462" y="120" width="276" height="600" fill="#EDE6D6" opacity="0.5"/>

  <!-- Skylight shaft from ceiling -->
  <polygon points="462,120 738,120 680,0 520,0" fill="#EDE6D6" opacity="0.3"/>
  <polygon points="462,120 738,120 680,0 520,0" fill="#D4C9B0" opacity="0.2"/>

  <!-- Light beam cast on floor -->
  <polygon points="480,720 720,720 760,800 440,800" fill="#EDE6D6" opacity="0.25"/>

  <!-- Center feature element: floating horizontal shelf -->
  <rect x="500" y="390" width="200" height="16" fill="#1C1916"/>
  <rect x="490" y="406" width="10" height="120" fill="#1C1916"/>
  <rect x="700" y="406" width="10" height="120" fill="#1C1916"/>

  <!-- Minimalist art object on shelf -->
  <rect x="570" y="360" width="60" height="30" fill="#C4622D" opacity="0.8"/>
  <rect x="592" y="340" width="16" height="20" fill="#C4622D" opacity="0.6"/>

  <!-- Horizontal ruled lines (bookcase / texture) on left panel -->
  <line x1="220" y1="180" x2="300" y2="180" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="220" x2="300" y2="220" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="260" x2="300" y2="260" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="300" x2="300" y2="300" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="340" x2="300" y2="340" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="380" x2="300" y2="380" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="420" x2="300" y2="420" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="460" x2="300" y2="460" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="500" x2="300" y2="500" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="540" x2="300" y2="540" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="580" x2="300" y2="580" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="620" x2="300" y2="620" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="660" x2="300" y2="660" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>

  <!-- Horizontal ruled lines right panel -->
  <line x1="900" y1="180" x2="980" y2="180" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="220" x2="980" y2="220" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="260" x2="980" y2="260" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="300" x2="980" y2="300" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="340" x2="980" y2="340" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="380" x2="980" y2="380" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="420" x2="980" y2="420" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="460" x2="980" y2="460" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="500" x2="980" y2="500" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="540" x2="980" y2="540" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="580" x2="980" y2="580" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="620" x2="980" y2="620" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>
  <line x1="900" y1="660" x2="980" y2="660" stroke="#D4C9B0" stroke-width="0.5" opacity="0.4"/>

  <!-- Floor material lines (marble / stone veining) -->
  <line x1="0" y1="740" x2="1200" y2="740" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="760" x2="1200" y2="760" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="780" x2="1200" y2="780" stroke="#9E9182" stroke-width="0.3" opacity="0.2"/>
  <line x1="200" y1="720" x2="200" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="720" x2="400" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="600" y1="720" x2="600" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="800" y1="720" x2="800" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>
  <line x1="1000" y1="720" x2="1000" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.3"/>

  <!-- Ceiling detail: recessed lighting track -->
  <rect x="400" y="108" width="400" height="12" fill="#9E9182" opacity="0.4"/>
  <circle cx="450" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
  <circle cx="520" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
  <circle cx="590" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
  <circle cx="660" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
  <circle cx="730" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
  <circle cx="780" cy="114" r="5" fill="#EDE6D6" opacity="0.8"/>
</svg>
