  <line x1="790" y1="280" x2="950" y2="280" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="790" y1="340" x2="950" y2="340" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="790" y1="400" x2="950" y2="400" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="790" y1="460" x2="950" y2="460" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="790" y1="520" x2="950" y2="520" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="790" y1="580" x2="950" y2="580" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
