  <line x1="250" y1="480" x2="410" y2="480" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="540" x2="410" y2="540" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="250" y1="600" x2="410" y2="600" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
