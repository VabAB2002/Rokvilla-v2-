  <line x1="400" y1="430" x2="680" y2="430" stroke="#D4C9B0" stroke-width="0.6" opacity="0.4"/>
  <line x1="400" y1="480" x2="680" y2="480" stroke="#D4C9B0" stroke-width="0.6" opacity="0.4"/>
  <line x1="400" y1="530" x2="680" y2="530" stroke="#D4C9B0" stroke-width="0.6" opacity="0.4"/>
  <line x1="400" y1="580" x2="680" y2="580" stroke="#D4C9B0" stroke-width="0.6" opacity="0.4"/>
  <line x1="400" y1="630" x2="680" y2="630" stroke="#D4C9B0" stroke-width="0.6" opacity="0.4"/>
