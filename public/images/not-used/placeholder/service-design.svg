<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Drafting table surface -->
  <rect x="200" y="320" width="800" height="400" fill="#D4C9B0" opacity="0.4"/>

  <!-- Blueprint paper -->
  <rect x="280" y="260" width="640" height="420" fill="#1C1916" opacity="0.08"/>
  <rect x="300" y="280" width="600" height="380" fill="#EDE6D6" stroke="#9E9182" stroke-width="1"/>

  <!-- Floor plan grid lines -->
  <line x1="300" y1="380" x2="900" y2="380" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="300" y1="460" x2="900" y2="460" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="300" y1="540" x2="900" y2="540" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="460" y1="280" x2="460" y2="660" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="620" y1="280" x2="620" y2="660" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="780" y1="280" x2="780" y2="660" stroke="#D4C9B0" stroke-width="0.8"/>

  <!-- Room outlines (floor plan) -->
  <rect x="320" y="300" width="260" height="160" fill="none" stroke="#1C1916" stroke-width="2"/>
  <rect x="620" y="300" width="260" height="160" fill="none" stroke="#1C1916" stroke-width="2"/>
  <rect x="320" y="480" width="180" height="160" fill="none" stroke="#1C1916" stroke-width="2"/>
  <rect x="520" y="480" width="360" height="160" fill="none" stroke="#1C1916" stroke-width="2"/>

  <!-- Door arcs -->
  <path d="M 580 460 A 30 30 0 0 0 550 430" fill="none" stroke="#1C1916" stroke-width="1.5"/>
  <path d="M 500 480 A 25 25 0 0 1 525 505" fill="none" stroke="#1C1916" stroke-width="1.5"/>

  <!-- T-square ruler -->
  <rect x="180" y="250" width="16" height="440" fill="#9E9182"/>
  <rect x="180" y="450" width="420" height="8" fill="#9E9182"/>

  <!-- Terracotta compass arc -->
  <circle cx="700" cy="380" r="60" fill="none" stroke="#C4622D" stroke-width="2.5"/>
  <line x1="700" y1="380" x2="742" y2="338" stroke="#C4622D" stroke-width="2"/>
  <circle cx="700" cy="380" r="3" fill="#C4622D"/>

  <!-- Dimension annotations -->
  <line x1="320" y1="680" x2="580" y2="680" stroke="#9E9182" stroke-width="1"/>
  <line x1="320" y1="674" x2="320" y2="686" stroke="#9E9182" stroke-width="1"/>
  <line x1="580" y1="674" x2="580" y2="686" stroke="#9E9182" stroke-width="1"/>

  <!-- Pencil element -->
  <line x1="920" y1="340" x2="980" y2="280" stroke="#1C1916" stroke-width="4"/>
  <line x1="980" y1="280" x2="990" y2="270" stroke="#C4622D" stroke-width="3"/>
</svg>
