<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Ground plane -->
  <rect x="0" y="640" width="1200" height="160" fill="#D4C9B0"/>

  <!-- Shadow / ground line -->
  <line x1="0" y1="640" x2="1200" y2="640" stroke="#9E9182" stroke-width="1"/>

  <!-- Distant landscape band -->
  <rect x="0" y="560" width="1200" height="80" fill="#D4C9B0" opacity="0.5"/>

  <!-- Main house volume - left wing -->
  <rect x="160" y="380" width="320" height="260" fill="#1C1916"/>

  <!-- Main house volume - right wing, taller -->
  <rect x="460" y="300" width="240" height="340" fill="#1C1916"/>

  <!-- Bridge / connector element -->
  <rect x="480" y="430" width="200" height="20" fill="#C4622D"/>

  <!-- Flat roof overhang - left wing -->
  <rect x="130" y="375" width="380" height="12" fill="#9E9182"/>

  <!-- Flat roof overhang - right wing -->
  <rect x="440" y="295" width="280" height="12" fill="#9E9182"/>

  <!-- Vertical window slots - left wing -->
  <rect x="200" y="420" width="18" height="120" fill="#EDE6D6" opacity="0.9"/>
  <rect x="240" y="420" width="18" height="120" fill="#EDE6D6" opacity="0.9"/>
  <rect x="280" y="420" width="18" height="120" fill="#EDE6D6" opacity="0.9"/>
  <rect x="390" y="420" width="18" height="120" fill="#EDE6D6" opacity="0.9"/>
  <rect x="420" y="420" width="18" height="120" fill="#EDE6D6" opacity="0.9"/>

  <!-- Horizontal window band - right wing -->
  <rect x="470" y="360" width="220" height="40" fill="#EDE6D6" opacity="0.85"/>
  <line x1="540" y1="360" x2="540" y2="400" stroke="#9E9182" stroke-width="1"/>
  <line x1="610" y1="360" x2="610" y2="400" stroke="#9E9182" stroke-width="1"/>
  <line x1="620" y1="360" x2="620" y2="400" stroke="#9E9182" stroke-width="1"/>

  <!-- Terracotta accent column -->
  <rect x="700" y="340" width="30" height="300" fill="#C4622D"/>

  <!-- Right side floating volume -->
  <rect x="760" y="390" width="280" height="250" fill="#9E9182" opacity="0.5"/>
  <rect x="760" y="390" width="280" height="8" fill="#9E9182"/>

  <!-- Window grid on right volume -->
  <rect x="780" y="420" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>
  <rect x="860" y="420" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>
  <rect x="940" y="420" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>
  <rect x="780" y="490" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>
  <rect x="860" y="490" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>
  <rect x="940" y="490" width="60" height="50" fill="#EDE6D6" opacity="0.7"/>

  <!-- Geometric landscape element - foreground low wall -->
  <rect x="160" y="630" width="880" height="14" fill="#1C1916"/>
  <rect x="160" y="618" width="60" height="26" fill="#1C1916"/>
  <rect x="960" y="618" width="80" height="26" fill="#1C1916"/>

  <!-- Minimal tree element left -->
  <line x1="100" y1="640" x2="100" y2="420" stroke="#1C1916" stroke-width="4"/>
  <line x1="100" y1="480" x2="60" y2="440" stroke="#1C1916" stroke-width="2"/>
  <line x1="100" y1="500" x2="130" y2="460" stroke="#1C1916" stroke-width="2"/>
  <line x1="100" y1="460" x2="70" y2="430" stroke="#1C1916" stroke-width="2"/>

  <!-- Minimal tree element right -->
  <line x1="1100" y1="640" x2="1100" y2="460" stroke="#1C1916" stroke-width="4"/>
  <line x1="1100" y1="510" x2="1070" y2="480" stroke="#1C1916" stroke-width="2"/>
  <line x1="1100" y1="530" x2="1130" y2="495" stroke="#1C1916" stroke-width="2"/>

  <!-- Sky subtle grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#D4C9B0" stroke-width="0.5"/>
  <line x1="0" y1="280" x2="1200" y2="280" stroke="#D4C9B0" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="380" stroke="#D4C9B0" stroke-width="0.5"/>
</svg>
