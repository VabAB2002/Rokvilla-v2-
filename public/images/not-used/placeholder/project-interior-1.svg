<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background / room interior -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Ceiling plane (slightly darker) -->
  <rect x="0" y="0" width="1200" height="180" fill="#D4C9B0"/>

  <!-- Floor plane (slightly darker) -->
  <rect x="0" y="680" width="1200" height="120" fill="#D4C9B0"/>

  <!-- Left wall (perspective) -->
  <polygon points="0,0 280,180 280,680 0,800" fill="#9E9182" opacity="0.25"/>

  <!-- Right wall (perspective) -->
  <polygon points="1200,0 920,180 920,680 1200,800" fill="#9E9182" opacity="0.25"/>

  <!-- Back wall -->
  <rect x="280" y="180" width="640" height="500" fill="#EDE6D6"/>
  <rect x="280" y="180" width="640" height="500" fill="#D4C9B0" opacity="0.15"/>

  <!-- Perspective lines from corners to vanishing point -->
  <line x1="0" y1="0" x2="600" y2="180" stroke="#9E9182" stroke-width="1" opacity="0.4"/>
  <line x1="1200" y1="0" x2="600" y2="180" stroke="#9E9182" stroke-width="1" opacity="0.4"/>
  <line x1="0" y1="800" x2="600" y2="680" stroke="#9E9182" stroke-width="1" opacity="0.4"/>
  <line x1="1200" y1="800" x2="600" y2="680" stroke="#9E9182" stroke-width="1" opacity="0.4"/>

  <!-- Ceiling / floor division lines -->
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#1C1916" stroke-width="1.5"/>
  <line x1="0" y1="680" x2="1200" y2="680" stroke="#1C1916" stroke-width="1.5"/>

  <!-- Large window / opening on back wall -->
  <rect x="340" y="230" width="520" height="380" fill="#C4622D" opacity="0.08"/>
  <rect x="340" y="230" width="520" height="380" fill="#EDE6D6" opacity="0.6"/>
  <!-- Window frame -->
  <rect x="340" y="230" width="520" height="8" fill="#1C1916"/>
  <rect x="340" y="602" width="520" height="8" fill="#1C1916"/>
  <rect x="340" y="230" width="8" height="380" fill="#1C1916"/>
  <rect x="852" y="230" width="8" height="380" fill="#1C1916"/>

  <!-- Window mullions - vertical -->
  <rect x="513" y="230" width="4" height="380" fill="#1C1916" opacity="0.6"/>
  <rect x="683" y="230" width="4" height="380" fill="#1C1916" opacity="0.6"/>

  <!-- Window mullions - horizontal -->
  <rect x="340" y="390" width="520" height="4" fill="#1C1916" opacity="0.6"/>

  <!-- Floor reflection / light pool -->
  <ellipse cx="600" cy="700" rx="260" ry="30" fill="#EDE6D6" opacity="0.5"/>

  <!-- Left architectural element: floor-to-ceiling column -->
  <rect x="310" y="180" width="30" height="500" fill="#1C1916"/>
  <rect x="860" y="180" width="30" height="500" fill="#1C1916"/>

  <!-- Ceiling element: exposed beam -->
  <rect x="0" y="155" width="1200" height="25" fill="#1C1916" opacity="0.1"/>
  <rect x="280" y="160" width="640" height="20" fill="#1C1916" opacity="0.15"/>

  <!-- Minimalist furniture suggestion: long bench left -->
  <rect x="50" y="590" width="200" height="18" fill="#1C1916" opacity="0.7"/>
  <rect x="65" y="608" width="10" height="30" fill="#1C1916" opacity="0.7"/>
  <rect x="225" y="608" width="10" height="30" fill="#1C1916" opacity="0.7"/>

  <!-- Minimalist furniture: long bench right -->
  <rect x="950" y="590" width="200" height="18" fill="#1C1916" opacity="0.7"/>
  <rect x="965" y="608" width="10" height="30" fill="#1C1916" opacity="0.7"/>
  <rect x="1125" y="608" width="10" height="30" fill="#1C1916" opacity="0.7"/>

  <!-- Pendant light suggestion -->
  <line x1="600" y1="0" x2="600" y2="160" stroke="#1C1916" stroke-width="2"/>
  <ellipse cx="600" cy="170" rx="40" ry="12" fill="#1C1916" opacity="0.8"/>
  <!-- Light cone -->
  <polygon points="560,182 640,182 680,320 520,320" fill="#EDE6D6" opacity="0.2"/>

  <!-- Terracotta accent wall panel left -->
  <rect x="0" y="220" width="60" height="380" fill="#C4622D" opacity="0.35"/>

  <!-- Terracotta accent panel right -->
  <rect x="1140" y="220" width="60" height="380" fill="#C4622D" opacity="0.35"/>

  <!-- Floor parquet lines suggestion -->
  <line x1="280" y1="700" x2="920" y2="700" stroke="#9E9182" stroke-width="0.5" opacity="0.5"/>
  <line x1="280" y1="720" x2="920" y2="720" stroke="#9E9182" stroke-width="0.5" opacity="0.5"/>
  <line x1="280" y1="740" x2="920" y2="740" stroke="#9E9182" stroke-width="0.5" opacity="0.5"/>
  <line x1="280" y1="760" x2="920" y2="760" stroke="#9E9182" stroke-width="0.5" opacity="0.5"/>
  <line x1="350" y1="680" x2="350" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
  <line x1="450" y1="680" x2="450" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
  <line x1="550" y1="680" x2="550" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
  <line x1="650" y1="680" x2="650" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
  <line x1="750" y1="680" x2="750" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
  <line x1="850" y1="680" x2="850" y2="800" stroke="#9E9182" stroke-width="0.4" opacity="0.4"/>
</svg>
