<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Ground plane -->
  <rect x="0" y="640" width="1200" height="160" fill="#D4C9B0"/>
  <line x1="0" y1="640" x2="1200" y2="640" stroke="#9E9182" stroke-width="1"/>

  <!-- Building under construction - main volume -->
  <rect x="300" y="260" width="600" height="380" fill="#1C1916"/>

  <!-- Exposed concrete floors -->
  <rect x="300" y="380" width="600" height="8" fill="#9E9182"/>
  <rect x="300" y="500" width="600" height="8" fill="#9E9182"/>

  <!-- Window openings (no glass yet - under construction) -->
  <rect x="340" y="290" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="460" y="290" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="660" y="290" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="780" y="290" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>

  <rect x="340" y="410" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="460" y="410" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="660" y="410" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="780" y="410" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>

  <rect x="340" y="530" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>
  <rect x="460" y="530" width="80" height="70" fill="#EDE6D6" opacity="0.85"/>

  <!-- Terracotta structural beam accent -->
  <rect x="280" y="250" width="640" height="16" fill="#C4622D"/>

  <!-- Scaffolding - left -->
  <line x1="240" y1="640" x2="240" y2="200" stroke="#9E9182" stroke-width="3"/>
  <line x1="200" y1="640" x2="200" y2="200" stroke="#9E9182" stroke-width="3"/>
  <line x1="200" y1="300" x2="240" y2="300" stroke="#9E9182" stroke-width="2"/>
  <line x1="200" y1="400" x2="240" y2="400" stroke="#9E9182" stroke-width="2"/>
  <line x1="200" y1="500" x2="240" y2="500" stroke="#9E9182" stroke-width="2"/>
  <!-- Diagonal braces -->
  <line x1="200" y1="400" x2="240" y2="300" stroke="#9E9182" stroke-width="1"/>
  <line x1="200" y1="500" x2="240" y2="400" stroke="#9E9182" stroke-width="1"/>

  <!-- Scaffolding - right -->
  <line x1="960" y1="640" x2="960" y2="200" stroke="#9E9182" stroke-width="3"/>
  <line x1="1000" y1="640" x2="1000" y2="200" stroke="#9E9182" stroke-width="3"/>
  <line x1="960" y1="300" x2="1000" y2="300" stroke="#9E9182" stroke-width="2"/>
  <line x1="960" y1="400" x2="1000" y2="400" stroke="#9E9182" stroke-width="2"/>
  <line x1="960" y1="500" x2="1000" y2="500" stroke="#9E9182" stroke-width="2"/>
  <line x1="960" y1="400" x2="1000" y2="300" stroke="#9E9182" stroke-width="1"/>
  <line x1="960" y1="500" x2="1000" y2="400" stroke="#9E9182" stroke-width="1"/>

  <!-- Crane arm -->
  <line x1="150" y1="640" x2="150" y2="120" stroke="#1C1916" stroke-width="5"/>
  <line x1="150" y1="130" x2="600" y2="130" stroke="#1C1916" stroke-width="4"/>
  <line x1="150" y1="130" x2="60" y2="130" stroke="#1C1916" stroke-width="4"/>
  <!-- Crane cable -->
  <line x1="500" y1="130" x2="500" y2="220" stroke="#9E9182" stroke-width="1.5"/>

  <!-- Foundation line -->
  <rect x="280" y="636" width="640" height="8" fill="#1C1916"/>

  <!-- Material pile -->
  <rect x="1040" y="600" width="100" height="40" fill="#9E9182" opacity="0.6"/>
  <rect x="1060" y="570" width="60" height="30" fill="#9E9182" opacity="0.4"/>
</svg>
