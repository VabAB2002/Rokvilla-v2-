<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Floor -->
  <rect x="0" y="580" width="1200" height="220" fill="#D4C9B0" opacity="0.5"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#9E9182" stroke-width="1"/>

  <!-- Back wall -->
  <rect x="100" y="120" width="1000" height="460" fill="#EDE6D6" stroke="#D4C9B0" stroke-width="1"/>

  <!-- Wall paneling lines -->
  <line x1="350" y1="120" x2="350" y2="580" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="600" y1="120" x2="600" y2="580" stroke="#D4C9B0" stroke-width="0.8"/>
  <line x1="850" y1="120" x2="850" y2="580" stroke="#D4C9B0" stroke-width="0.8"/>

  <!-- Pendant lamp -->
  <line x1="600" y1="0" x2="600" y2="160" stroke="#1C1916" stroke-width="1.5"/>
  <rect x="560" y="160" width="80" height="50" rx="4" fill="none" stroke="#1C1916" stroke-width="2"/>
  <line x1="570" y1="210" x2="630" y2="210" stroke="#9E9182" stroke-width="1"/>

  <!-- Artwork frame on wall -->
  <rect x="430" y="200" width="160" height="120" fill="none" stroke="#1C1916" stroke-width="2"/>
  <rect x="445" y="215" width="130" height="90" fill="#9E9182" opacity="0.3"/>
  <rect x="470" y="240" width="40" height="40" fill="#C4622D" opacity="0.5"/>

  <!-- Sofa - main body -->
  <rect x="250" y="460" width="500" height="120" rx="6" fill="#1C1916"/>
  <!-- Sofa back -->
  <rect x="240" y="400" width="520" height="70" rx="6" fill="#1C1916"/>
  <!-- Sofa arms -->
  <rect x="230" y="400" width="30" height="180" rx="4" fill="#1C1916"/>
  <rect x="740" y="400" width="30" height="180" rx="4" fill="#1C1916"/>

  <!-- Terracotta cushions -->
  <rect x="290" y="470" width="140" height="60" rx="4" fill="#C4622D"/>
  <rect x="460" y="470" width="140" height="60" rx="4" fill="#C4622D" opacity="0.75"/>
  <rect x="630" y="470" width="90" height="60" rx="4" fill="#C4622D" opacity="0.5"/>

  <!-- Side table - right -->
  <rect x="820" y="480" width="80" height="4" fill="#9E9182"/>
  <line x1="830" y1="484" x2="830" y2="580" stroke="#1C1916" stroke-width="3"/>
  <line x1="890" y1="484" x2="890" y2="580" stroke="#1C1916" stroke-width="3"/>

  <!-- Vase on side table -->
  <rect x="845" y="440" width="30" height="40" rx="2" fill="#9E9182"/>
  <line x1="855" y1="440" x2="850" y2="410" stroke="#1C1916" stroke-width="1.5"/>
  <line x1="860" y1="440" x2="868" y2="408" stroke="#1C1916" stroke-width="1.5"/>

  <!-- Coffee table -->
  <rect x="380" y="590" width="240" height="6" fill="#9E9182"/>
  <line x1="400" y1="596" x2="400" y2="640" stroke="#1C1916" stroke-width="3"/>
  <line x1="600" y1="596" x2="600" y2="640" stroke="#1C1916" stroke-width="3"/>

  <!-- Rug under sofa -->
  <rect x="200" y="620" width="600" height="80" rx="2" fill="#D4C9B0" opacity="0.6"/>
  <line x1="240" y1="660" x2="760" y2="660" stroke="#9E9182" stroke-width="0.5"/>

  <!-- Floor lamp - left -->
  <line x1="160" y1="580" x2="160" y2="300" stroke="#1C1916" stroke-width="3"/>
  <rect x="140" y="290" width="40" height="30" rx="2" fill="none" stroke="#1C1916" stroke-width="1.5"/>
</svg>
