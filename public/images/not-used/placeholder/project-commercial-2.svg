<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <!-- Background -->
  <rect width="1200" height="800" fill="#EDE6D6"/>

  <!-- Horizon wash -->
  <rect x="0" y="480" width="1200" height="320" fill="#D4C9B0" opacity="0.4"/>

  <!-- Ground plane -->
  <rect x="0" y="720" width="1200" height="80" fill="#D4C9B0"/>
  <line x1="0" y1="720" x2="1200" y2="720" stroke="#1C1916" stroke-width="1"/>

  <!-- Perspective pavement grid -->
  <line x1="600" y1="720" x2="0" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="720" x2="300" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="720" x2="600" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="720" x2="900" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="720" x2="1200" y2="800" stroke="#9E9182" stroke-width="0.5" opacity="0.4"/>

  <!-- Horizontal perspective lines on ground -->
  <line x1="0" y1="740" x2="1200" y2="740" stroke="#9E9182" stroke-width="0.4" opacity="0.3"/>
  <line x1="0" y1="760" x2="1200" y2="760" stroke="#9E9182" stroke-width="0.4" opacity="0.3"/>
  <line x1="0" y1="780" x2="1200" y2="780" stroke="#9E9182" stroke-width="0.4" opacity="0.3"/>

  <!-- LOW horizontal corporate complex: long base -->
  <rect x="80" y="560" width="1040" height="160" fill="#1C1916"/>

  <!-- Terracotta band at top of base -->
  <rect x="80" y="557" width="1040" height="8" fill="#C4622D"/>

  <!-- Horizontal window strips in base -->
  <rect x="100" y="580" width="980" height="30" fill="#EDE6D6" opacity="0.12"/>
  <rect x="100" y="625" width="980" height="30" fill="#EDE6D6" opacity="0.12"/>

  <!-- Vertical divisions in base -->
  <line x1="240" y1="560" x2="240" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>
  <line x1="400" y1="560" x2="400" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>
  <line x1="560" y1="560" x2="560" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="560" x2="720" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>
  <line x1="880" y1="560" x2="880" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>
  <line x1="1040" y1="560" x2="1040" y2="720" stroke="#9E9182" stroke-width="0.8" opacity="0.3"/>

  <!-- Upper towers rising above base -->
  <!-- Tower A - left -->
  <rect x="120" y="220" width="180" height="340" fill="#1C1916" opacity="0.9"/>
  <rect x="120" y="215" width="180" height="10" fill="#9E9182"/>
  <!-- Curtain wall A -->
  <rect x="135" y="240" width="150" height="300" fill="#EDE6D6" opacity="0.06"/>
  <line x1="170" y1="220" x2="170" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="220" y1="220" x2="220" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="270" y1="220" x2="270" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="120" y1="270" x2="300" y2="270" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="330" x2="300" y2="330" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="390" x2="300" y2="390" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="450" x2="300" y2="450" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="120" y1="510" x2="300" y2="510" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>

  <!-- Tower B - center-left -->
  <rect x="360" y="140" width="200" height="420" fill="#1C1916"/>
  <rect x="360" y="135" width="200" height="10" fill="#C4622D"/>
  <!-- Curtain wall B -->
  <line x1="400" y1="140" x2="400" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="450" y1="140" x2="450" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="500" y1="140" x2="500" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="360" y1="200" x2="560" y2="200" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="260" x2="560" y2="260" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="320" x2="560" y2="320" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="380" x2="560" y2="380" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="440" x2="560" y2="440" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="360" y1="500" x2="560" y2="500" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>

  <!-- Tower C - center dominant -->
  <rect x="490" y="60" width="220" height="500" fill="#1C1916"/>
  <rect x="490" y="55" width="220" height="12" fill="#9E9182"/>
  <!-- Curtain wall C dense -->
  <line x1="530" y1="60" x2="530" y2="560" stroke="#D4C9B0" stroke-width="0.8" opacity="0.45"/>
  <line x1="570" y1="60" x2="570" y2="560" stroke="#D4C9B0" stroke-width="0.8" opacity="0.45"/>
  <line x1="610" y1="60" x2="610" y2="560" stroke="#D4C9B0" stroke-width="0.8" opacity="0.45"/>
  <line x1="650" y1="60" x2="650" y2="560" stroke="#D4C9B0" stroke-width="0.8" opacity="0.45"/>
  <line x1="690" y1="60" x2="690" y2="560" stroke="#D4C9B0" stroke-width="0.8" opacity="0.45"/>
  <line x1="490" y1="110" x2="710" y2="110" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="160" x2="710" y2="160" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="210" x2="710" y2="210" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="260" x2="710" y2="260" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="310" x2="710" y2="310" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="360" x2="710" y2="360" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="410" x2="710" y2="410" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="460" x2="710" y2="460" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>
  <line x1="490" y1="510" x2="710" y2="510" stroke="#D4C9B0" stroke-width="0.5" opacity="0.35"/>

  <!-- Tower D - right -->
  <rect x="720" y="180" width="180" height="380" fill="#1C1916" opacity="0.9"/>
  <rect x="720" y="175" width="180" height="10" fill="#9E9182"/>
  <line x1="760" y1="180" x2="760" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="810" y1="180" x2="810" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="860" y1="180" x2="860" y2="560" stroke="#D4C9B0" stroke-width="0.7" opacity="0.4"/>
  <line x1="720" y1="240" x2="900" y2="240" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="720" y1="300" x2="900" y2="300" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="720" y1="360" x2="900" y2="360" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="720" y1="420" x2="900" y2="420" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>
  <line x1="720" y1="480" x2="900" y2="480" stroke="#D4C9B0" stroke-width="0.5" opacity="0.3"/>

  <!-- Terracotta accent strip right side -->
  <rect x="900" y="300" width="8" height="260" fill="#C4622D" opacity="0.8"/>

  <!-- Tower E - far right -->
  <rect x="920" y="260" width="160" height="300" fill="#1C1916" opacity="0.75"/>
  <rect x="920" y="255" width="160" height="8" fill="#9E9182" opacity="0.8"/>
  <line x1="960" y1="260" x2="960" y2="560" stroke="#D4C9B0" stroke-width="0.6" opacity="0.3"/>
  <line x1="1010" y1="260" x2="1010" y2="560" stroke="#D4C9B0" stroke-width="0.6" opacity="0.3"/>
  <line x1="1060" y1="260" x2="1060" y2="560" stroke="#D4C9B0" stroke-width="0.6" opacity="0.3"/>
</svg>
